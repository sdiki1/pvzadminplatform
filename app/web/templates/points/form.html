{% extends "base.html" %}
{% block title %}{{ 'Редактировать' if item else 'Новая' }} точка - PVZ Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Редактировать точку' if item else 'Новая точка' }}</h1>
    <a href="/points" class="btn btn-outline-secondary btn-sm">Назад</a>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="form-card">
    <form method="post" action="{{ '/points/' + item.id|string + '/edit' if item else '/points/new' }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Название <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" value="{{ item.name if item else '' }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Короткое название</label>
                <input type="text" class="form-control" name="short_name" value="{{ item.short_name if item and item.short_name else '' }}">
            </div>
            <div class="col-md-8">
                <label class="form-label">Адрес <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="address" value="{{ item.address if item else '' }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Код</label>
                <input type="text" class="form-control" name="code" value="{{ item.code if item and item.code else '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Нормализованный адрес</label>
                <input type="text" class="form-control" name="address_normalized" value="{{ item.address_normalized if item and item.address_normalized else '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Бренд</label>
                <select class="form-select" name="brand">
                    <option value="wb" {% if item and item.brand.value == 'wb' %}selected{% endif %}>WB</option>
                    <option value="ozon" {% if item and item.brand.value == 'ozon' %}selected{% endif %}>Ozon</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Маркетплейс</label>
                <select class="form-select" name="marketplace_id">
                    <option value="">-</option>
                    {% for mp in marketplaces %}
                    <option value="{{ mp.id }}" {% if item and item.marketplace_id == mp.id %}selected{% endif %}>{{ mp.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Широта</label>
                <input type="number" step="0.0000001" class="form-control" name="latitude" value="{{ item.latitude if item else '0' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Долгота</label>
                <input type="number" step="0.0000001" class="form-control" name="longitude" value="{{ item.longitude if item else '0' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Радиус (м)</label>
                <input type="number" class="form-control" name="radius_m" value="{{ item.radius_m if item else '150' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Начало работы</label>
                <input type="time" class="form-control" name="work_start" value="{{ item.work_start.strftime('%H:%M') if item and item.work_start else '09:00' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Конец работы</label>
                <input type="time" class="form-control" name="work_end" value="{{ item.work_end.strftime('%H:%M') if item and item.work_end else '21:00' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Email точки <small class="text-muted">(для кодов открытия смены)</small></label>
                <input type="email" class="form-control" name="email" value="{{ item.email if item and item.email else '' }}" placeholder="pvz@example.com">
            </div>
            <div class="col-12">
                <label class="form-label">Комментарий</label>
                <textarea class="form-control" name="comment" rows="2">{{ item.comment if item and item.comment else '' }}</textarea>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                           {% if not item or item.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">Активна</label>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/points" class="btn btn-outline-secondary ms-2">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
