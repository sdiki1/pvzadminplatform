{% extends "base.html" %}
{% block title %}Редактировать сотрудника - PVZ Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Редактировать сотрудника</h1>
    <a href="/employees" class="btn btn-outline-secondary btn-sm">Назад</a>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="form-card">
    <form method="post" action="/employees/{{ item.id }}/edit">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">ФИО <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="full_name" value="{{ item.full_name }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Телефон</label>
                <input type="text" class="form-control" name="phone" value="{{ item.phone or '' }}">
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                           {% if item.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">Активен</label>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="/employees/{{ item.id }}" class="btn btn-outline-secondary ms-2">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
